<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0b1220" flood-opacity="0.28"/>
    </filter>
    <clipPath id="gclip"><circle cx="512" cy="440" r="118"/></clipPath>
  </defs>

  <!-- rounded-square background -->
  <rect x="80" y="80" width="864" height="864" rx="196" fill="url(#bg)"/>

  <!-- location pin -->
  <g filter="url(#sh)">
    <path d="M512 270
             C 414 270 335 349 335 447
             C 335 530 430 630 512 760
             C 594 630 689 530 689 447
             C 689 349 610 270 512 270 Z"
          fill="#ffffff"/>
  </g>

  <!-- globe inside the pin head -->
  <circle cx="512" cy="440" r="118" fill="url(#globe)"/>
  <g clip-path="url(#gclip)" fill="none" stroke="#ffffff" stroke-width="12"
     stroke-opacity="0.95" stroke-linecap="round">
    <line x1="394" y1="440" x2="630" y2="440"/>
    <line x1="512" y1="322" x2="512" y2="558"/>
    <ellipse cx="512" cy="440" rx="56" ry="118"/>
    <ellipse cx="512" cy="440" rx="118" ry="52"/>
  </g>
  <circle cx="512" cy="440" r="118" fill="none" stroke="#ffffff" stroke-width="14"/>
</svg>

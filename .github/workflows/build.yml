name: Build installers

# 手动触发，或推送 v* 形式的 tag 时自动触发。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 允许 tag 触发时创建 Release 并上传安装包

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS runner 同时产出 Intel(x64) 和 Apple Silicon(arm64) 两个 dmg。
          - name: macOS
            os: macos-latest
            script: dist:mac
            artifact: macos-dmg
            glob: dist/*.dmg
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: windows-exe
            glob: dist/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # --publish never：只产出安装包，不自动发布到 GitHub Releases
        # （否则 tag 触发时 electron-builder 会要求 GH_TOKEN）。
        run: npm run ${{ matrix.script }} -- --publish never
        env:
          # 不做签名/公证，仅产出未签名安装包。
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

      # 仅当由 v* tag 触发时：把安装包挂到对应的 GitHub Release。
      # 该 action 幂等——首个 job 创建 Release，其余 job 追加文件。
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.glob }}

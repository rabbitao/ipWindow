name: Build installers

# 手动触发，或推送 v* 形式的 tag 时自动触发。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS runner 同时产出 Intel(x64) 和 Apple Silicon(arm64) 两个 dmg。
          - name: macOS
            os: macos-latest
            script: dist:mac
            artifact: macos-dmg
            glob: dist/*.dmg
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: windows-exe
            glob: dist/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          # 不做签名/公证，仅产出未签名安装包。
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
